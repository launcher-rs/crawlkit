[package]
name = "crawlkit"
version = "0.4.0"
edition = "2024"
description = "crawlkit Rust 爬虫工具包 — 集成入口（facade crate）"
repository.workspace = true
license.workspace = true

[dependencies]
crawlkit-core = { path = "../crawlkit-core", version = "0.4.0" }
crawlkit-fetcher = { path = "../crawlkit-fetcher", version = "0.3.2" }
crawlkit-fetcher-reqwest = { path = "../crawlkit-fetcher-reqwest", version = "0.3.2", optional = true }
crawlkit-fetcher-wreq = { path = "../crawlkit-fetcher-wreq", version = "0.3.2", optional = true }
crawlkit-parser = { path = "../crawlkit-parser", version = "0.4.0" }
crawlkit-media = { path = "../crawlkit-media", version = "0.3.2", optional = true }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = "2"
regex = "1"
rand = "0.8"
futures = "0.3"

[dev-dependencies]
async-trait = "0.1"
reqwest = { version = "0.13", features = ["json", "gzip", "brotli", "deflate", "zstd"] }

[lints]
workspace = true

[features]
default = ["fetcher-reqwest", "media"]
fetcher-reqwest = ["crawlkit-fetcher-reqwest"]
fetcher-wreq = ["crawlkit-fetcher-wreq"]
media = ["crawlkit-media"]

[[example]]
name = "callback"
path = "examples/callback.rs"

