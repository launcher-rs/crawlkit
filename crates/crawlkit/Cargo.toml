name = "readability"
path = "examples/readability.rs"

[[example]]
name = "composite_fetcher"
path = "examples/composite_fetcher.rs"

[[example]]
name = "custom_jina_client"
path = "examples/custom_jina_client.rs"

[[example]]
name = "custom_firecrawl_client"
path = "examples/custom_firecrawl_client.rs"

[[example]]
name = "custom_service_fallback"
path = "examples/custom_service_fallback.rs"

[[example]]
name = "on_html_element"
path = "examples/on_html_element.rs"

[[example]]
name = "rustcc_news"
path = "examples/rustcc_news.rs"

[[example]]
